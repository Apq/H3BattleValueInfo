# BattleValueInfo 配置文件
# 修改后需重启游戏生效
# 本插件依赖 MegaDesc 提供生物信息窗口扩展、背景、按钮、描述区布局。

[CreatureInfo]
# 是否显示生物的配置值（单只 fight_value，与数量无关）
ShowFightValue=1

[Layout]
# 战斗价值行相对原版生物名称行的 Y 偏移
FightValueYOffset=8

[RangedPower]
# 是否在战斗中右键空白格时显示双方远程力量对比
ShowRangedPower=1

[Format]
LabelFightValue=Fight Value
LabelOurSide=Ours
LabelEnemySide=Enemy
