# BattleValueInfo 配置文件
# 修改后需重启游戏生效
# 本插件依赖 MegaDesc 提供生物信息窗口扩展、背景、按钮、描述区布局。

[General]
# 总开关
Enabled=1

[CreatureInfo]
# 是否显示总战斗价值
ShowFightValue=1
# 是否追加剩余比例，例如 12345(80%)
ShowRemainingPercent=0

[RangedPower]
# 是否在战斗中右键空白格时显示双方远程力量对比
ShowRangedPower=1

[Format]
LabelFightValue=Fight Value
LabelOurSide=Ours
LabelEnemySide=Enemy
