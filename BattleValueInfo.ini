# BattleValueInfo 配置文件
# 修改后需重启游戏生效
# 本插件依赖 MegaDesc 提供生物信息窗口扩展、背景、按钮、描述区布局。

[Layout]
# 战斗价值行相对原版生物名称行的 Y 偏移
FightValueYOffset=8

[RangedPanel]
# 面板背景图片文件名；文件放在插件目录的 img 子目录中。
# 只支持 1-plane 8-bit PCX（自带调色板）。
BackgroundImage=rp_bg.pcx
TextFont=smalfont.fnt
TextColor=4
Width=298
Height=93
Y=3
# 三行文字各自的 Y 坐标（相对面板顶部）
Row1Y=24
Row2Y=42
Row3Y=60

[Format]
LabelFightValue=战斗价值
